<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoundBox Image Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
        }

        h1 {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
        }

        .controls-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            height: fit-content;
            position: sticky;
            top: 2rem;
        }

        .control-group {
            margin-bottom: 1.5rem;
        }

        .control-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #e94560;
            background: rgba(0, 0, 0, 0.5);
        }

        input[type="color"] {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: none;
        }

        .range-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #e94560;
            cursor: pointer;
            transition: transform 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .range-value {
            min-width: 50px;
            text-align: center;
            font-weight: bold;
            color: #e94560;
        }

        .preview-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        .canvas-container {
            background: 
                linear-gradient(45deg, #2a2a4a 25%, transparent 25%), 
                linear-gradient(-45deg, #2a2a4a 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #2a2a4a 75%), 
                linear-gradient(-45deg, transparent 75%, #2a2a4a 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #1a1a2e;
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .canvas-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(233, 69, 96, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        canvas {
            display: block;
            border-radius: 4px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        canvas:hover {
            transform: scale(1.02);
        }

        .export-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .output-area {
            width: 100%;
            max-width: 600px;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-family: monospace;
            font-size: 0.9rem;
            resize: vertical;
        }

        .presets {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .preset-btn {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preset-btn:hover {
            background: rgba(233, 69, 96, 0.3);
            border-color: #e94560;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
            .controls-panel {
                position: static;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 RoundBox Image Generator</h1>
        
        <div class="controls-panel">
            <div class="control-group">
                <label>Text Content</label>
                <input type="text" id="textInput" value="Hello" maxlength="20">
            </div>

            <div class="control-group">
                <label>Background Color</label>
                <input type="color" id="bgColor" value="#e94560">
                <div class="presets">
                    <button class="preset-btn" onclick="setColor('#e94560')">Coral</button>
                    <button class="preset-btn" onclick="setColor('#0f3460')">Navy</button>
                    <button class="preset-btn" onclick="setColor('#533483')">Purple</button>
                    <button class="preset-btn" onclick="setColor('#f39422')">Orange</button>
                    <button class="preset-btn" onclick="setColor('#16c79a')">Teal</button>
                </div>
            </div>

            <div class="control-group">
                <label>Text Color</label>
                <input type="color" id="textColor" value="#ffffff">
            </div>

            <div class="control-group">
                <label>Corner Radius</label>
                <div class="range-container">
                    <input type="range" id="cornerRadius" min="0" max="100" value="20">
                    <span class="range-value" id="radiusValue">20px</span>
                </div>
            </div>

            <div class="control-group">
                <label>Font Size</label>
                <div class="range-container">
                    <input type="range" id="fontSize" min="20" max="120" value="48">
                    <span class="range-value" id="fontValue">48px</span>
                </div>
            </div>

            <div class="control-group">
                <label>Padding</label>
                <div class="range-container">
                    <input type="range" id="padding" min="10" max="100" value="30">
                    <span class="range-value" id="paddingValue">30px</span>
                </div>
            </div>

            <div class="control-group">
                <label>Font Weight</label>
                <select id="fontWeight">
                    <option value="normal">Normal</option>
                    <option value="bold" selected>Bold</option>
                    <option value="900">Black</option>
                </select>
            </div>

            <div class="control-group">
                <label>Shadow Intensity</label>
                <div class="range-container">
                    <input type="range" id="shadowIntensity" min="0" max="50" value="20">
                    <span class="range-value" id="shadowValue">20</span>
                </div>
            </div>
        </div>

        <div class="preview-area">
            <div class="canvas-container">
                <canvas id="canvas"></canvas>
            </div>

            <div class="export-buttons">
                <button class="btn-primary" onclick="downloadPNG()">📥 Download PNG</button>
                <button class="btn-secondary" onclick="copyBase64()">📋 Copy Base64</button>
                <button class="btn-secondary" onclick="showBase64()">👁️ Show Base64</button>
            </div>

            <div class="output-area" id="outputArea" style="display: none;">
                <label>Base64 Data URL</label>
                <textarea id="base64Output" readonly></textarea>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Input elements
        const inputs = {
            text: document.getElementById('textInput'),
            bgColor: document.getElementById('bgColor'),
            textColor: document.getElementById('textColor'),
            cornerRadius: document.getElementById('cornerRadius'),
            fontSize: document.getElementById('fontSize'),
            padding: document.getElementById('padding'),
            fontWeight: document.getElementById('fontWeight'),
            shadowIntensity: document.getElementById('shadowIntensity')
        };

        // Value displays
        const displays = {
            radius: document.getElementById('radiusValue'),
            font: document.getElementById('fontValue'),
            padding: document.getElementById('paddingValue'),
            shadow: document.getElementById('shadowValue')
        };

        function updateDisplay(input, display, suffix = 'px') {
            displays[display].textContent = input.value + suffix;
        }

        // Add event listeners
        Object.keys(inputs).forEach(key => {
            inputs[key].addEventListener('input', () => {
                if (key === 'cornerRadius') updateDisplay(inputs[key], 'radius');
                if (key === 'fontSize') updateDisplay(inputs[key], 'font');
                if (key === 'padding') updateDisplay(inputs[key], 'padding');
                if (key === 'shadowIntensity') updateDisplay(inputs[key], 'shadow', '');
                draw();
            });
        });

        function setColor(color) {
            inputs.bgColor.value = color;
            draw();
        }

        function roundRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        function draw() {
            const text = inputs.text.value || ' ';
            const padding = parseInt(inputs.padding.value);
            const fontSize = parseInt(inputs.fontSize.value);
            const radius = parseInt(inputs.cornerRadius.value);
            const shadowBlur = parseInt(inputs.shadowIntensity.value);
            
            // Set font to measure text
            ctx.font = `${inputs.fontWeight.value} ${fontSize}px "Segoe UI", sans-serif`;
            
            // Measure text
            const metrics = ctx.measureText(text);
            const textWidth = metrics.width;
            const textHeight = fontSize;
            
            // Calculate canvas size
            const width = textWidth + (padding * 2);
            const height = textHeight + (padding * 1.5);
            
            // Set canvas size with high DPI support
            const dpr = window.devicePixelRatio || 1;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            ctx.scale(dpr, dpr);
            
            // Clear canvas
            ctx.clearRect(0, 0, width, height);
            
            // Draw shadow
            if (shadowBlur > 0) {
                ctx.save();
                ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
                ctx.shadowBlur = shadowBlur;
                ctx.shadowOffsetY = shadowBlur / 3;
                roundRect(ctx, 0, 0, width, height, radius);
                ctx.fillStyle = inputs.bgColor.value;
                ctx.fill();
                ctx.restore();
            }
            
            // Draw rounded rectangle
            roundRect(ctx, 0, 0, width, height, radius);
            ctx.fillStyle = inputs.bgColor.value;
            ctx.fill();
            
            // Draw text
            ctx.fillStyle = inputs.textColor.value;
            ctx.font = `${inputs.fontWeight.value} ${fontSize}px "Segoe UI", sans-serif`;
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'center';
            ctx.fillText(text, width / 2, height / 2);
        }

        function downloadPNG() {
            const link = document.createElement('a');
            link.download = `roundbox-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function getBase64() {
            return canvas.toDataURL('image/png');
        }

        function copyBase64() {
            const base64 = getBase64();
            navigator.clipboard.writeText(base64).then(() => {
                const btn = event.target;
                const original = btn.textContent;
                btn.textContent = '✅ Copied!';
                setTimeout(() => btn.textContent = original, 2000);
            });
        }

        function showBase64() {
            const outputArea = document.getElementById('outputArea');
            const output = document.getElementById('base64Output');
            output.value = getBase64();
            outputArea.style.display = outputArea.style.display === 'none' ? 'block' : 'none';
        }

        // Initial draw
        draw();
    </script>
</body>
</html>
