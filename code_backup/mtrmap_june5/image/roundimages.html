<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle Crop Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            color: #e2e8f0;
            overflow-x: hidden;
        }

        /* Custom Range Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #38bdf8;
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #334155;
            border-radius: 2px;
        }

        /* Checkerboard pattern for transparency visualization */
        .checkerboard {
            background-image: 
                linear-gradient(45deg, #1e293b 25%, transparent 25%), 
                linear-gradient(-45deg, #1e293b 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #1e293b 75%), 
                linear-gradient(-45deg, transparent 75%, #1e293b 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #0f172a;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Animation for download */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 0; }
        }
        .animate-pulse-ring::before {
            content: '';
            position: absolute;
            left: 0; top: 0; right: 0; bottom: 0;
            border-radius: 0.5rem;
            border: 2px solid #38bdf8;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 md:p-8">

    <!-- Header -->
    <header class="w-full max-w-6xl mb-8 flex flex-col md:flex-row justify-between items-center animate-fade-in-down">
        <div class="mb-4 md:mb-0 text-center md:text-left">
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">
                Circle Crop Studio
            </h1>
            <p class="text-slate-400 mt-2 text-sm md:text-base">Professional circular avatars & icons with custom borders.</p>
        </div>
        <div class="flex gap-3">
            <button onclick="document.getElementById('fileInput').click()" class="group relative px-6 py-3 font-bold text-white rounded-lg overflow-hidden bg-slate-800 transition-all hover:scale-105 active:scale-95 shadow-lg hover:shadow-cyan-500/25">
                <span class="absolute w-0 h-0 transition-all duration-500 ease-out bg-cyan-500 rounded-full group-hover:w-56 group-hover:h-56 opacity-10"></span>
                <span class="relative flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    Upload Image
                </span>
            </button>
            <input type="file" id="fileInput" accept="image/*" class="hidden">
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Left Column: Controls -->
        <div class="lg:col-span-4 flex flex-col gap-6">
            
            <!-- Settings Panel -->
            <div class="glass-panel rounded-2xl p-6 shadow-2xl">
                <h2 class="text-xl font-semibold mb-6 flex items-center gap-2 text-cyan-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                    Configuration
                </h2>

                <!-- Border Toggle -->
                <div class="flex items-center justify-between mb-6">
                    <label class="text-slate-300 font-medium">Add Border</label>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="borderToggle" class="sr-only peer" checked>
                        <div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-cyan-500"></div>
                    </label>
                </div>

                <!-- Border Controls (Conditional) -->
                <div id="borderControls" class="space-y-6 transition-all duration-300">
                    <!-- Border Color -->
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-2">Border Color</label>
                        <div class="flex items-center gap-3">
                            <input type="color" id="borderColor" value="#ffffff" class="w-10 h-10 rounded cursor-pointer bg-transparent border-0 p-0">
                            <span id="colorValue" class="text-sm font-mono text-slate-500">#ffffff</span>
                        </div>
                    </div>

                    <!-- Border Width -->
                    <div>
                        <div class="flex justify-between mb-2">
                            <label class="text-sm font-medium text-slate-400">Border Thickness</label>
                            <span id="widthValue" class="text-sm font-mono text-cyan-400">5%</span>
                        </div>
                        <input type="range" id="borderWidth" min="0" max="20" value="5" step="0.5">
                    </div>
                </div>

                <!-- Padding/Zoom Control -->
                <div class="mt-6 pt-6 border-t border-slate-700">
                    <div class="flex justify-between mb-2">
                        <label class="text-sm font-medium text-slate-400">Image Scale</label>
                        <span id="scaleValue" class="text-sm font-mono text-cyan-400">100%</span>
                    </div>
                    <input type="range" id="imageScale" min="50" max="150" value="100" step="1">
                </div>
            </div>

            <!-- Action Button -->
            <button id="downloadBtn" class="w-full py-4 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold rounded-xl shadow-lg shadow-cyan-500/30 transform transition hover:-translate-y-1 active:translate-y-0 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 text-lg">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Download PNG
            </button>

        </div>

        <!-- Right Column: Preview -->
        <div class="lg:col-span-8 flex flex-col">
            <div class="glass-panel rounded-2xl p-1 flex-grow flex items-center justify-center relative min-h-[500px] overflow-hidden">
                
                <!-- Empty State -->
                <div id="emptyState" class="text-center p-10">
                    <div class="w-24 h-24 bg-slate-800 rounded-full mx-auto mb-4 flex items-center justify-center border-2 border-dashed border-slate-600">
                        <svg class="w-10 h-10 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    </div>
                    <h3 class="text-xl font-medium text-slate-300">No Image Selected</h3>
                    <p class="text-slate-500 mt-2">Upload a square image to get started</p>
                </div>

                <!-- Canvas Container -->
                <div id="canvasContainer" class="hidden relative w-full h-full flex items-center justify-center checkerboard rounded-xl overflow-hidden">
                    <canvas id="previewCanvas" class="max-w-full max-h-[600px] shadow-2xl"></canvas>
                </div>

            </div>
            <p class="text-center text-slate-500 text-xs mt-4">Preview shown with transparency grid. Final PNG will have transparent corners.</p>
        </div>

    </main>

    <script>
        // --- DOM Elements ---
        const fileInput = document.getElementById('fileInput');
        const previewCanvas = document.getElementById('previewCanvas');
        const ctx = previewCanvas.getContext('2d');
        const emptyState = document.getElementById('emptyState');
        const canvasContainer = document.getElementById('canvasContainer');
        const downloadBtn = document.getElementById('downloadBtn');
        
        // Controls
        const borderToggle = document.getElementById('borderToggle');
        const borderControls = document.getElementById('borderControls');
        const borderColorInput = document.getElementById('borderColor');
        const colorValueDisplay = document.getElementById('colorValue');
        const borderWidthInput = document.getElementById('borderWidth');
        const widthValueDisplay = document.getElementById('widthValue');
        const imageScaleInput = document.getElementById('imageScale');
        const scaleValueDisplay = document.getElementById('scaleValue');

        // --- State ---
        let currentImage = null;
        let settings = {
            hasBorder: true,
            borderColor: '#ffffff',
            borderWidthPercent: 5, // Percentage of radius
            imageScale: 100
        };

        // --- Event Listeners ---

        // File Upload
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        currentImage = img;
                        // Set canvas size to match image natural size for high quality output
                        // We assume square input as per prompt, but we crop to the min dimension
                        const size = Math.min(img.naturalWidth, img.naturalHeight);
                        previewCanvas.width = size;
                        previewCanvas.height = size;
                        
                        emptyState.classList.add('hidden');
                        canvasContainer.classList.remove('hidden');
                        render();
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // Settings Changes
        borderToggle.addEventListener('change', (e) => {
            settings.hasBorder = e.target.checked;
            borderControls.style.opacity = settings.hasBorder ? '1' : '0.5';
            borderControls.style.pointerEvents = settings.hasBorder ? 'auto' : 'none';
            render();
        });

        borderColorInput.addEventListener('input', (e) => {
            settings.borderColor = e.target.value;
            colorValueDisplay.textContent = e.target.value;
            render();
        });

        borderWidthInput.addEventListener('input', (e) => {
            settings.borderWidthPercent = parseFloat(e.target.value);
            widthValueDisplay.textContent = settings.borderWidthPercent + '%';
            render();
        });

        imageScaleInput.addEventListener('input', (e) => {
            settings.imageScale = parseInt(e.target.value);
            scaleValueDisplay.textContent = settings.imageScale + '%';
            render();
        });

        downloadBtn.addEventListener('click', downloadImage);

        // --- Core Logic ---

        function render() {
            if (!currentImage) return;

            const width = previewCanvas.width;
            const height = previewCanvas.height;
            const centerX = width / 2;
            const centerY = height / 2;
            
            // Clear canvas
            ctx.clearRect(0, 0, width, height);

            // Calculate geometry
            // Outer radius is half the canvas size
            const outerRadius = width / 2;
            
            // Border width in pixels
            const borderWidthPx = (settings.borderWidthPercent / 100) * outerRadius;
            
            // Inner radius (where the image clips)
            const innerRadius = settings.hasBorder ? outerRadius - borderWidthPx : outerRadius;

            // 1. Create clipping path for the circle
            ctx.save();
            ctx.beginPath();
            ctx.arc(centerX, centerY, innerRadius, 0, Math.PI * 2);
            ctx.closePath();
            ctx.clip();

            // 2. Draw the image inside the clipped circle
            // We need to scale and center the image
            const scale = settings.imageScale / 100;
            
            // Calculate dimensions to cover the circle area while maintaining aspect ratio
            // We want the image to fill the inner circle completely
            const imgAspect = currentImage.naturalWidth / currentImage.naturalHeight;
            
            // Target dimensions to fill the square bounding box of the circle
            let drawWidth = innerRadius * 2 * scale;
            let drawHeight = innerRadius * 2 * scale;
            
            // Adjust for aspect ratio to cover (similar to object-fit: cover)
            if (imgAspect > 1) {
                // Image is wider than tall
                drawHeight = drawWidth / imgAspect;
            } else {
                // Image is taller than wide
                drawWidth = drawHeight * imgAspect;
            }

            const drawX = centerX - (drawWidth / 2);
            const drawY = centerY - (drawHeight / 2);

            ctx.drawImage(currentImage, drawX, drawY, drawWidth, drawHeight);
            
            ctx.restore(); // Remove clip

            // 3. Draw the border (if enabled)
            if (settings.hasBorder && settings.borderWidthPercent > 0) {
                ctx.save();
                ctx.beginPath();
                // Draw a ring: Outer circle minus Inner circle
                // But simpler: Draw outer circle, then cut out inner circle using 'destination-out' or just draw the stroke?
                // Drawing a stroke on the outer edge is tricky with arc.
                // Better approach: Draw the border as a thick stroke around the inner radius?
                // No, that centers the stroke.
                
                // Correct approach for Ring:
                // 1. Draw Outer Circle
                // 2. Draw Inner Circle (Counter-clockwise to create hole)
                ctx.arc(centerX, centerY, outerRadius, 0, Math.PI * 2, false);
                ctx.arc(centerX, centerY, innerRadius, 0, Math.PI * 2, true); // Reverse for hole
                ctx.closePath();
                
                ctx.fillStyle = settings.borderColor;
                ctx.fill();
                ctx.restore();
            }
        }

        function downloadImage() {
            if (!currentImage) return;
            
            // Create a temporary link
            const link = document.createElement('a');
            link.download = 'circle-crop-' + Date.now() + '.png';
            link.href = previewCanvas.toDataURL('image/png');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Initialize UI state
        borderControls.style.opacity = settings.hasBorder ? '1' : '0.5';
    </script>
</body>
</html>
